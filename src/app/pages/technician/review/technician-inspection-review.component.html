<section class="dia-page">
  @if (loading()) {
    <p>Loading review…</p>
  } @else if (error()) {
    <div class="admin-panel"><p>{{ error() }}</p></div>
  } @else if (inspection(); as item) {
    <header class="admin-page-header">
      <div>
        <span class="admin-kicker">Review inspection</span>
        <h1>Quarter {{ item.quarter }} submission</h1>
        <p>{{ item.status }} · {{ item.isReadOnly ? 'Read only' : 'Ready to submit' }}</p>
      </div>
      <a mat-stroked-button routerLink="/technician">Back to dashboard</a>
    </header>

    <div class="admin-panel">
      <app-technician-inspection-sections [inspection]="item" />
    </div>

    <div class="tech-form-actions">
      @if (!item.isReadOnly) {
        <a mat-stroked-button [routerLink]="['/technician/inspection', item.id]">Edit</a>
        <button mat-flat-button type="button" [disabled]="submitting()" (click)="submit()">Submit inspection</button>
      }
    </div>
  }
</section>
